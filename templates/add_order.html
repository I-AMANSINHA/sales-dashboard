{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Log New Transaction</h2>
            <a href="{{ url_for('dashboard_view') }}" class="btn btn-secondary w-auto m-0">◀ Back to Dashboard</a>
        </div>
        
        <form method="POST" action="{{ url_for('add_order_page') }}">
            <div class="mb-3">
                <label class="form-label">Customer Name</label>
                <input type="text" name="customer" class="form-control" placeholder="e.g. John Doe" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Product Name</label>
                <input type="text" name="product" class="form-control" placeholder="e.g. Enterprise Laptop" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Amount ($)</label>
                <input type="number" step="0.01" name="amount" class="form-control" placeholder="0.00" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Save Transaction to Database</button>
        </form>
    </div>
</div>
{% endblock %}
